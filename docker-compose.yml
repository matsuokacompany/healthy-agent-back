services:
  postgres:
    image: postgres:16

    container_name: healthy-postgres

    restart: always

    environment:
      POSTGRES_DB: healthy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Julha@2026Postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: fastapi_app

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: always

    depends_on:
      - postgres

volumes:
  postgres_data: